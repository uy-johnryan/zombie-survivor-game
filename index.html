<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zombiesurvivorgame.net</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <h1 class="game-title">Zombie Survivor</h1>

    <div class="game-ui">
        <div class="ui-box">Score: <span id="score">0</span></div>
        <div class="ui-box">Wave: <span id="wave">1</span></div>
        <div class="ui-box">Health: <span id="health">100</span></div>
        <div class="ui-box">Player: <span id="playerNameDisplay">Guest</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>

        <div id="startScreen" class="overlay-screen">
            <h2>Zombie Survivor</h2>

            <p>Survive as many waves as possible!</p>

            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Password">
            <input type="text" id="usernameInput" placeholder="Username" maxlength="15">

            <button id="loginButton">Login</button>
            <button id="registerButton">Register</button>
            <button id="startButton" disabled>Start Game</button>
        </div>

        <div id="gameOverScreen" class="overlay-screen hidden">
            <h2>Game Over</h2>

            <p>Player: <span id="finalPlayerName">Guest</span></p>
            <p>Final Score: <span id="finalScore">0</span></p>

            <button id="restartButton">Restart</button>
        </div>

        <!-- OPTIONAL (only if you used them in JS) -->
        <div id="waveNotification" class="hidden"></div>
    </div>

    <div class="leaderboard">
        <h2>Top Survivors</h2>
        <ol id="leaderboardList"></ol>
    </div>

    <script type="module" src="js/script.js"></script>
    
</body>
</html>
